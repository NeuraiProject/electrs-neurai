services:
  neuraid:
    build:
      context: ./node
      dockerfile: Dockerfile
      args:
        BRANCH: DePIN-Test
    image: neuraiproject/neuraid:mainnet-1.0.0
    container_name: neurai-electrs-mainnet-node
    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    environment:
      # ── Network ──────────────────────────────────────────────────────────
      NEURAI_TESTNET: "0"
      # NEURAI_LISTEN must be 1: electrs needs P2P to bulk-download blocks from the daemon.
      NEURAI_LISTEN: "1"
      NEURAI_REST: "1"

      # ── RPC ──────────────────────────────────────────────────────────────
      NEURAI_RPC_USER: "neurai"
      NEURAI_RPC_PASSWORD: "changeme"
      # NEURAI_RPC_ALLOW_IP: restrict in production (e.g. 127.0.0.1/32)
      NEURAI_RPC_ALLOW_IP: "0.0.0.0/0"
      NEURAI_RPC_PORT: "19001"
      NEURAI_RPC_TIMEOUT: "240"
      NEURAI_RPC_WORKQUEUE: "64"
      NEURAI_RPC_THREADS: "8"

      # ── Wallet ───────────────────────────────────────────────────────────
      # NEURAI_DISABLE_WALLET: 1=disabled | 0=enabled
      NEURAI_DISABLE_WALLET: "1"

      # ── Indexes ──────────────────────────────────────────────────────────
      NEURAI_TXINDEX: "1"
      NEURAI_ASSETINDEX: "1"
      NEURAI_ADDRESSINDEX: "1"
      NEURAI_TIMESTAMPINDEX: "1"
      NEURAI_SPENTINDEX: "1"
      NEURAI_PUBKEYINDEX: "1"

      # ── Data ─────────────────────────────────────────────────────────────
      NEURAI_DATADIR: "/data"

    volumes:
      - neurai_data:/data

    ports:
      - "19000:19000"   # mainnet P2P
      - "19001:19001"   # mainnet RPC

    networks:
      - neurai_net

    healthcheck:
      test: ["CMD", "neurai-cli", "-datadir=/data", "getblockchaininfo"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  electrs:
    # ── Build mode: pick one ─────────────────────────────────────────────
    # (1) LOCAL — copies the working tree at ../../ . Fast iteration without
    #     pushing to GitHub. Active by default.
    build:
      context: ../..
      dockerfile: Dockerfile
    # (2) GITHUB — clones a published ref. Use for reproducible builds.
    #     Comment block (1) above and uncomment block (2) below to switch.
    # build:
    #   context: ./electrs
    #   dockerfile: Dockerfile
    #   args:
    #     REPO_URL: https://github.com/NeuraiProject/electrs-neurai.git
    #     REPO_REF: master
    image: neuraiproject/electrs-neurai:mainnet-1.0.0
    container_name: neurai-mainnet-electrs
    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    # `auth` (RPC user:password) lives in ./electrs/config.toml because it
    # cannot be passed via CLI args or env vars. All other settings are
    # supplied via `command:` below to override the image's default CMD.
    volumes:
      - electrs_data:/var/lib/electrs-neurai
      - ./electrs/config.toml:/etc/electrs/config.toml:ro

    command:
      - "--network"
      - "neurai"
      - "--db-dir"
      - "/var/lib/electrs-neurai"
      - "--daemon-rpc-addr"
      - "neuraid:19001"
      - "--daemon-p2p-addr"
      - "neuraid:19000"
      - "--electrum-rpc-addr"
      - "0.0.0.0:50001"
      - "--log-filters"
      - "INFO"

    ports:
      - "50001:50001"   # Electrum mainnet RPC

    networks:
      - neurai_net

    depends_on:
      neuraid:
        condition: service_healthy

  electrs-tls:
    build:
      context: ./electrs-tls
      dockerfile: Dockerfile
    image: neuraiproject/electrs-neurai-tls:mainnet-1.0.0
    container_name: neurai-mainnet-electrs-tls
    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    # Mount your own cert.pem / key.pem at /etc/electrs-tls to skip the
    # self-signed cert auto-generated on first start.
    volumes:
      - electrs_tls_certs:/etc/electrs-tls

    ports:
      - "50002:50002"   # ssl://  (Electrum native + TLS)
      - "50004:50004"   # wss://  (Electrum WebSocket + TLS, for browser wallets)

    networks:
      - neurai_net

    depends_on:
      - electrs

volumes:
  neurai_data:
    driver: local
  electrs_data:
    driver: local
  electrs_tls_certs:
    driver: local

networks:
  neurai_net:
    driver: bridge
