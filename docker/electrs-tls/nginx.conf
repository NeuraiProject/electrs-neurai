user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log notice;

# Load dynamic modules shipped by Debian's nginx packages
# (in particular ngx_stream_module.so, needed for the SSL→TCP gateway below).
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

# ── WSS: HTTPS + WebSocket → local websockify (plain WS) → electrs:60001 ──
http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    access_log /var/log/nginx/access.log;

    server {
        listen 50004 ssl;
        http2  on;

        ssl_certificate     /etc/electrs-tls/cert.pem;
        ssl_certificate_key /etc/electrs-tls/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass         http://127.0.0.1:60002;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
        }
    }
}

# ── SSL: raw TCP + TLS termination → electrs:60001 ──
stream {
    upstream electrs_tcp {
        server electrs:60001;
    }

    server {
        listen 50002 ssl;

        ssl_certificate     /etc/electrs-tls/cert.pem;
        ssl_certificate_key /etc/electrs-tls/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        proxy_pass    electrs_tcp;
        proxy_timeout 1h;
    }
}
