[general]
env_prefix = "ELECTRS"
conf_file_param = "conf"
conf_dir_param = "conf_dir"
skip_default_conf_files_switch = "skip_default_conf_files"
doc = """
Electrum server for the Neurai (XNA) blockchain, adapted from romanz/electrs.

Indexes the full Neurai blockchain (including assets and KAWPOW block headers) so wallets can keep real-time track of balances, transaction history, and asset holdings without disclosing addresses to external Electrum servers."""

[[switch]]
name = "verbose"
abbr = "v"
doc = "Increase logging verbosity"
count = true

[[switch]]
name = "timestamp"
doc = "Prepend log lines with a timestamp"

[[switch]]
name = "auto_reindex"
doc = "Automatically reindex the database if it's inconsistent or in old format"
default = true

[[param]]
name = "db_dir"
type = "std::path::PathBuf"
doc = "Directory to store index database (default: ./db/)"
default = "\"./db\".into()"

[[param]]
name = "db_log_dir"
type = "std::path::PathBuf"
doc = "Directory to store index database internal log (default: same as specified by `db_dir`)"

[[param]]
name = "db_parallelism"
type = "u8"
doc = "Max threads to use for DB background operations (flushes and compactions)"
default = "1"

[[param]]
name = "daemon_dir"
type = "std::path::PathBuf"
doc = "Data directory of Neurai daemon (default: ~/.neurai/)"
default = "crate::config::default_daemon_dir()"

[[param]]
name = "auth"
type = "String"
doc = "JSONRPC authentication ('USER:PASSWORD', default: use cookie file)"
# Force the user to use config file in order to avoid password leaks
argument = false
env_var = false

[[param]]
name = "cookie_file"
type = "std::path::PathBuf"
doc = "JSONRPC authentication cookie file (default: ~/.neurai/.cookie)"
# This is safe to configure on command line.

[[param]]
name = "network"
type = "crate::config::ConfiguredNetwork"
convert_into = "crate::neurai::NeuraiNetwork"
doc = "Select Neurai network type ('neurai', 'testnet' or 'regtest')"
default = "Default::default()"

[[param]]
name = "electrum_rpc_addr"
type = "crate::config::ResolvAddr"
doc = "Electrum server JSONRPC 'addr:port' to listen on (default: '127.0.0.1:50001' for neurai mainnet, '127.0.0.1:60001' for testnet, '127.0.0.1:60401' for regtest)"

[[param]]
name = "daemon_rpc_addr"
type = "crate::config::ResolvAddr"
doc = "Neurai daemon JSONRPC 'addr:port' to connect (default: 127.0.0.1:19001 for mainnet, 127.0.0.1:19101 for testnet, 127.0.0.1:19201 for regtest)"
[[param]]
name = "daemon_p2p_addr"
type = "crate::config::ResolvAddr"
doc = "Neurai daemon p2p 'addr:port' to connect (default: 127.0.0.1:19000 for mainnet, 127.0.0.1:19100 for testnet, 127.0.0.1:19200 for regtest)"

[[param]]
name = "monitoring_addr"
type = "crate::config::ResolvAddr"
doc = "Prometheus monitoring 'addr:port' to listen on (default: 127.0.0.1:4224 for mainnet, 127.0.0.1:14224 for testnet, 127.0.0.1:24224 for regtest)"

[[param]]
name = "wait_duration_secs"
type = "u64"
doc = "Duration to wait between Neurai daemon polling"
default = "10"

[[param]]
name = "jsonrpc_timeout_secs"
type = "u64"
doc = "Duration to wait until Neurai daemon JSON-RPC timeouts (must be greater than wait_duration_secs)."
default = "15"

[[param]]
name = "index_batch_size"
type = "usize"
doc = "Number of blocks to get in a single p2p protocol request from the Neurai daemon"
default = "10"

[[switch]]
name = "ignore_mempool"
doc = "Don't sync mempool - queries will show only confirmed transactions."

[[switch]]
name = "disable_electrum_rpc"
doc = "Disable Electrum RPC server - only sync and index blocks."

[[switch]]
name = "sync_once"
doc = "Exit after the initial sync is over (don't start Electrum server)."

[[switch]]
name = "skip_block_download_wait"
doc = "Don't wait for block download to finish before starting sync."

[[switch]]
name = "version"
doc = "Print out the program version."

[[param]]
name = "index_lookup_limit"
type = "usize"
doc = "Number of transactions to lookup before returning an error, to prevent 'too popular' addresses from causing the RPC server to get stuck (0 - disable the limit)"
default = "0"

[[param]]
name = "reindex_last_blocks"
type = "usize"
doc = "Number of last blocks to reindex (used for testing)"
default = "0"

[[param]]
name = "server_banner"
type = "String"
doc = "The banner to be shown in the Electrum console"
default = "concat!(\"Welcome to electrs-neurai \", env!(\"CARGO_PKG_VERSION\"), \" (Electrum server for Neurai)!\").to_owned()"

[[param]]
name = "log_filters"
type = "String"
doc = "Logging filters, overriding `RUST_LOG` environment variable (see https://docs.rs/env_logger/ for details)"
